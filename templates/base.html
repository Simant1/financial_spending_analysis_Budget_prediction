<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg app-nav mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">Finance Intelligence</a>
    {% if user.is_authenticated %}
    <div class="ms-auto d-flex align-items-center gap-2 flex-wrap justify-content-end">
      <a href="{% url 'architecture_view' %}" class="btn btn-glass btn-sm">Architecture</a>
      <a href="{% url 'meeting_script_view' %}" class="btn btn-glass btn-sm">Script</a>
      <span class="text-white-50 small">{{ user.username }}</span>
      <a href="{% url 'upload_dataset' %}" class="btn btn-glass btn-sm">Upload</a>
      <form action="{% url 'logout' %}" method="post">{% csrf_token %}<button class="btn btn-danger btn-sm">Logout</button></form>
    </div>
    {% endif %}
  </div>
</nav>
<div class="container pb-5">
  {% for message in messages %}<div class="alert alert-{{ message.tags|default:'info' }} shadow-sm">{{ message }}</div>{% endfor %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
