
{% extends 'base.html' %}
{% block content %}
<style>
  /* Modern gradient background */
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Poppins', sans-serif;
  }

  /* Glassmorphism card effect */
  .glass-card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 4px 12px rgba(0, 0, 0, 0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .glass-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
  }

  /* Custom form field styling */
  .custom-form input, 
  .custom-form select, 
  .custom-form textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    font-size: 14px;
    transition: all 0.3s ease;
    background: #fff;
  }

  .custom-form input:focus, 
  .custom-form select:focus, 
  .custom-form textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .custom-form label {
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
    color: #1e293b;
    font-size: 13px;
  }

  /* Error message styling */
  .errorlist {
    background: #fee2e2;
    color: #dc2626;
    padding: 8px 12px;
    border-radius: 12px;
    list-style: none;
    font-size: 12px;
    margin-top: 6px;
  }

  /* Help text styling */
  .helptext {
    font-size: 11px;
    color: #64748b;
    display: block;
    margin-top: 4px;
  }

  /* Register button */
  .btn-register {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 40px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    color: white;
    transition: all 0.3s ease;
  }

  .btn-register:hover {
    transform: scale(0.98);
    box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
  }

  /* Link styling */
  .custom-link {
    color: #667eea;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }

  .custom-link:hover {
    color: #764ba2;
    text-decoration: underline;
  }
</style>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="col-md-6 col-lg-5">
    <div class="glass-card p-4 p-md-5">
      <div class="text-center mb-4">
        <h2 class="fw-bold" style="background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          Create Account
        </h2>
        <p class="text-muted">Join us to manage your finances smarter</p>
      </div>

      <form method="post" class="custom-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-register w-100 mt-3">Register →</button>
      </form>

      <p class="text-center mt-4 mb-0">
        Already have an account? 
        <a href="{% url 'login' %}" class="custom-link">Login here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
