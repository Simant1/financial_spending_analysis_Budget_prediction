{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <h2 class="fw-bold mb-3">Create account</h2>
        <form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-success w-100 btn-lg">Register</button></form>
        <p class="mt-3 mb-0">Already have an account? <a href="{% url 'login' %}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
